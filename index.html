<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pet Pooja Home Kitchen | Ghar Jaisa Khana</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#d35400;
  --bg:#fff8f2;
  --text:#2c3e50;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);}

nav{
  padding:20px 8%;
  display:flex;
  justify-content:space-between;
  background:#fff;
  border-bottom:1px solid #eee;
  position:sticky;
  top:0;
  z-index:5;
}
.logo{font-family:Playfair Display,serif;font-size:1.7rem;}
.logo span{color:var(--accent);}

header{text-align:center;padding:60px 8% 40px;}
header h1{font-family:Playfair Display,serif;font-size:clamp(2rem,5vw,3.5rem);}
header p{max-width:600px;margin:auto;color:#666;}

.container{max-width:1200px;margin:auto;padding:0 8% 80px;}

.highlight-box{
  background:#fff3e8;
  border:1px solid #ffd2b3;
  padding:12px;
  border-radius:12px;
  margin:20px auto;
  text-align:center;
}

.menu-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:30px;
}

.food-card{
  background:#fff;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}
.food-card img{width:100%;height:200px;object-fit:cover;}
.card-info{text-align:center;padding:20px;}
.price{color:var(--accent);font-weight:600;margin:8px 0;}

.add-btn{
  background:#2c3e50;
  color:#fff;
  border:none;
  padding:8px 22px;
  border-radius:20px;
  cursor:pointer;
}

.qty{display:flex;justify-content:center;gap:10px;}
.qty button{
  width:26px;height:26px;border-radius:50%;
  border:1px solid #ccc;background:none;font-weight:bold;
}

/* ORDER SECTION */
.order-section{
  display:grid;
  grid-template-columns:380px 1fr;
  gap:40px;
  margin-top:60px;
}

.panel{
  background:#fff;
  padding:25px;
  border-radius:18px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.sticky-panel{
  position:sticky;
  top:100px;
  height:fit-content;
}

.cart-row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #f5f5f5;
}

.summary-row{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  font-weight:600;
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #ddd;
}

.whatsapp-btn{
  width:100%;
  background:#25D366;
  color:#fff;
  border:none;
  padding:14px;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
}
.whatsapp-btn:disabled{background:#9adbb0;}

.terms-row{display:flex;gap:8px;align-items:center;margin:10px 0;}
.req{color:red;}

.upi-box{text-align:center;margin-top:10px;}
.upiqr{width:160px;margin-top:10px;border-radius:10px;}

footer{
  text-align:center;
  padding:40px;
  border-top:1px solid #eee;
  color:#777;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Pet <span>Pooja</span></div>
  <div style="font-size:0.8rem;">Home Kitchen</div>
</nav>

<header>
<h1>Ghar Jaisa Khana,<br>Har Din Fresh.</h1>
<p>Homemade food prepared daily with hygiene and love.</p>
</header>

<div class="container">

<h2 style="text-align:center;color:#d35400;">Today's Menu</h2>

<div class="highlight-box">
📌 Minimum Order: Sanskriti ₹149 | Other Societies ₹299
</div>

<div class="order-section">

<!-- LEFT ORDER PANEL -->
<div class="panel sticky-panel">

<h2>Your Order</h2>

<div id="cartBox">
<p style="text-align:center;color:#aaa;">Add items to start</p>
</div>

<div class="summary-row">
  <span>Items Total</span>
  <span>₹ <span id="itemsTotal">0</span></span>
</div>

<div class="summary-row">
  <span>Delivery</span>
  <span>₹ <span id="deliveryCharge">0</span></span>
</div>

<hr>

<div class="summary-row">
  <span>Grand Total</span>
  <span>₹ <span id="grandTotal">0</span></span>
</div>

<hr>

<h3>Delivery Details</h3>

<form onsubmit="placeOrder(event)">

<input id="custName" placeholder="Your Name" required>
<input id="custPhone" placeholder="Mobile Number" required>

<select id="societySelect" onchange="updateDelivery()" required>
  <option value="">Select Society</option>
  <
